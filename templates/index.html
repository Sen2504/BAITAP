<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel Dashboard</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 15px;
}

.container {
    max-width: 100%;
    margin: 0 auto;
}

header {
    text-align: center;
    color: white;
    margin-bottom: 40px;
}

header h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
}

header p {
    font-size: 1.1em;
    opacity: 0.9;
}

.upload-section {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    margin-bottom: 30px;
}

.upload-section h2 {
    color: #333;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.upload-section h2 i {
    color: #667eea;
}

.form-group {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: nowrap;
}

.file-input-wrapper {
    position: relative;
    overflow: hidden;
    display: inline-block;
}

.file-input-wrapper input[type="file"] {
    position: absolute;
    left: -9999px;
}

.file-input-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: #f0f0f0;
    border: 2px dashed #667eea;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    color: #333;
    transition: all 0.3s ease;
    white-space: nowrap;
}

.file-input-label:hover {
    background: #667eea;
    color: white;
    border-color: #667eea;
}

.file-name {
    color: #666;
    font-size: 0.9em;
}

button[type="submit"] {
    padding: 10px 25px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
}

button[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
}

button[type="submit"]:active {
    transform: translateY(0);
}

.data-section {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    overflow-x: auto;
    margin-bottom: 30px;
}

.data-section h3 {
    color: #333;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.data-section h3 i {
    color: #667eea;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

table thead {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

table th {
    padding: 15px;
    text-align: left;
    font-weight: 600;
    position: sticky;
    top: 0;
}

table td {
    padding: 12px 15px;
    border-bottom: 1px solid #e0e0e0;
}

table tbody tr {
    transition: background-color 0.2s ease;
}

table tbody tr:nth-child(odd) {
    background-color: #f9f9f9;
}

table tbody tr:hover {
    background-color: #f0f4ff;
}

.chart-box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    margin-top: 30px;
    text-align: center;
}

.chart-box h3 {
    color: #333;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.chart-box h3 i {
    color: #667eea;
}

.chart-box img {
    max-width: 700px;
    width: 100%;
    border-radius: 10px;
}

@media (max-width: 600px) {
    header h1 {
        font-size: 1.8em;
    }

    .form-group {
        flex-direction: column;
        align-items: stretch;
    }

    .file-input-label {
        justify-content: center;
    }

    button[type="submit"] {
        justify-content: center;
    }

    table {
        font-size: 0.9em;
    }

    table th, table td {
        padding: 8px;
    }
}

</style>

</head>

<body>

<div class="container">
    <header>
        <h1><i class="fas fa-chart-bar"></i> Excel Dashboard</h1>
        <p>Upload và quản lý dữ liệu Excel của bạn</p>
    </header>

    <div class="upload-section">
        <h2><i class="fas fa-cloud-upload-alt"></i> Tải file Excel</h2>
        <form method="post" enctype="multipart/form-data">
            <div class="form-group">
                <div class="file-input-wrapper">
                    <input type="file" id="file-input" name="file" required accept=".xls,.xlsx,.xlsm">
                    <label for="file-input" class="file-input-label">
                        <i class="fas fa-file-excel"></i>
                        <span>Chọn file Excel</span>
                    </label>
                </div>
                <button type="submit"><i class="fas fa-arrow-up"></i> Tải lên</button>
            </div>
        </form>
    </div>

    {% if table %}
    <div class="data-section">
        <h3><i class="fas fa-table"></i> Dữ liệu bảng</h3>
        {{ table|safe }}
    </div>
    {% endif %}

    {% if chart_url %}
    <div class="chart-box">
        <h3> Biểu đồ người bệnh vào điều trị nội trú</h3>
        <img src="data:image/png;base64,{{ chart_url }}" alt="Pie chart">
    </div>
    {% endif %}
</div>

<script>
// Hiển thị tên file khi người dùng chọn
document.getElementById('file-input').addEventListener('change', function(e) {
    const label = document.querySelector('.file-input-label span');
    if (this.files && this.files[0]) {
        label.textContent = this.files[0].name;
    }
});
</script>

</body>
</html>
